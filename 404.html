<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Coming Soon - Netlinkr</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="images/logo.png" type="image/png">
        <!-- Include particles.js library -->
        <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
        <style>
            /* Basic Reset */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
    
            /* Body Styling */
            body {
                font-family: 'Arial', sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background-color: #000;
                color: #fff;
                text-align: center;
                overflow: hidden; /* Prevents scrollbars from appearing */
            }
    
            /* Background Container */
            #background {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                z-index: -1; /* Sends background behind other content */
            }
    
            /* Main Container */
            .main {
                padding: 40px;
                border-radius: 10px;
                box-shadow: 0px 0px 15px rgba(255, 255, 255, 0.1);
                width: 100%;
                max-width: 400px;
                position: relative; /* Ensures the container sits above the background */
                z-index: 1;
            }
    
            /* Logo Styling */
            .main img {
                max-width: 300px;
                margin-bottom: 5px;
            }
    
            /* Heading Styling */
            h1 {
                font-family: 'Helvetica Neue', sans-serif;
                margin-bottom: 20px;
                font-size: 24px;
            }
    
            /* Paragraph Styling */
            p {
                margin-bottom: 20px;
                font-size: 16px;
            }
    
            /* Label Styling */
            label {
                display: block;
                margin-bottom: 10px;
                font-size: 14px;
            }
    
            /* Input Box Styling */
            input[type="text"] {
                width: 100%;
                padding: 10px;
                margin-bottom: 20px;
                border: 1px solid #444;
                border-radius: 5px;
                background-color: #333;
                color: #fff;
            }
    
            /* Button Styling */
            button[type="submit"] {
                width: 100%;
                padding: 10px;
                border: none;
                border-radius: 5px;
                background-color: #fff;
                color: #000;
                font-size: 16px;
                cursor: pointer;
                transition: background-color 0.3s ease;
            }
    
            button[type="submit"]:hover {
                background-color: #ddd;
            }
    
            /* Error Message Styling */
            .error-message {
                color: #ff4444;
                font-size: 14px;
                margin-top: 10px;
                display: none; /* Hidden by default */
            }
    
            /* Ban Message Styling */
            .ban-message {
                color: #ff4444;
                font-size: 16px;
                margin-top: 20px;
                display: none; /* Hidden by default */
            }
    
            /* Admin Panel Styling */
            .admin-panel {
                margin-top: 20px;
            }

        </style>
    </head>
<body>
       <!-- Background Container -->
       <div id="background"></div>

       <!-- Main Content -->
       <div class="main">
           <!-- Logo Image -->
           <img src="images/logo.png" alt="Logo">
   
           <h1>Coming Soon</h1>
           <p>This page is still under development by the Netlinkr Team</p>
<!-- Go Back Button -->

 </style>
<button id="goBackButton" type="submit">Go back</button><br><br>
<div style="color: #fff;" class="copyright">
                Copyright © 2026 Netlinkr. All Rights Reserved.
              </div>
           </div>
       </div>
   
       <!-- JavaScript to Handle Form Submission and Admin Code -->
       <script>
         // Add event listener to the Go Back button
         document.getElementById('goBackButton').addEventListener('click', function() {
            window.history.back();
        });
           // Initialize particles.js
           particlesJS("background", {
               particles: {
                   number: {
                       value: 15, // Number of Particles (count)
                       density: {
                           enable: true,
                           value_area: 300, // Area where particles will be distributed
                       },
                   },
                   color: {
                       value: "#ffffff", // Particles color
                   },
                   shape: {
                       type: "triangle", // Shape type
                   },
                   opacity: {
                       value: 0.8, // Base opacity of particles
                       random: true,
                       anim: {
                           enable: true,
                           speed: 1,
                           opacity_min: 0.1,
                           sync: false,
                       },
                   },
                   size: {
                       value: 5, // Base size of particles
                       random: true,
                       anim: {
                           enable: true,
                           speed: 4,
                           size_min: 0.3,
                           sync: false,
                       },
                   },
                   // Connecting lines
                   line_linked: {
                       enable: true,
                       distance: 150, // Maximum distance between linked particles
                       color: "#ffffff",
                       opacity: 0.4,
                       width: 1,
                   },
                   // Particle movement
                   move: {
                       enable: true,
                       speed: 2.5,
                       direction: "none",
                       random: false,
                       straight: false,
                       out_mode: "bounce", // Behavior when particles move out of the canvas
                       bounce: false,
                   },
               },
               // Interactivity settings
               interactivity: {
                   detect_on: "canvas",
                   events: {
                       onhover: {
                           enable: true, // Enable hover interactivity
                           mode: "repulse",
                       },
                       onclick: {
                           enable: true, // Enable for click
                           mode: "push", // Push particles on click
                       },
                       resize: true, // Resize particles animation on window resize
                   },
               },
               // Detect retina displays
               retina_detect: true,
           });
       </script>
